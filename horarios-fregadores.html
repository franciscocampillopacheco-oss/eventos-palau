<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios Fregadores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1d232b;        /* pizarra de cocina */
    --steel:#2e3742;      /* acero oscuro */
    --paper:#f7f5f0;      /* ticket de comanda */
    --line:#dcd7cc;
    --muted:#7a8290;
    --banquetes:#c98a2d;  /* ámbar */
    --hotel:#2e7d6f;      /* verde cocina */
    --palau:#7059a8;      /* violeta */
    --hoy:#d94f30;        /* rojo comanda urgente */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--ink);color:var(--paper);font-family:'Barlow',system-ui,sans-serif;min-height:100vh}

  header{position:sticky;top:0;z-index:10;background:var(--ink);border-bottom:2px solid var(--steel);padding:14px 16px 12px}
  .brand{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  h1{font-family:'Barlow Condensed';font-weight:700;font-size:1.55rem;letter-spacing:.04em;text-transform:uppercase}
  h1 span{color:var(--banquetes)}
  .updated{font-size:.72rem;color:var(--muted);white-space:nowrap}

  .controls{display:flex;gap:8px;margin-top:10px}
  .search{flex:1;display:flex;align-items:center;background:var(--steel);border-radius:8px;padding:0 10px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--paper);font:inherit;font-size:1rem;padding:10px 6px}
  .search input::placeholder{color:var(--muted)}
  .btn{background:var(--steel);border:none;color:var(--paper);border-radius:8px;padding:0 14px;font:inherit;font-size:1.2rem;cursor:pointer}
  .btn:active{transform:scale(.95)}
  .btn:focus-visible,.chip:focus-visible,.search input:focus-visible{outline:2px solid var(--banquetes);outline-offset:2px}

  .chips{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .chip{flex:0 0 auto;font-family:'Barlow Condensed';font-weight:600;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:999px;border:1.5px solid var(--steel);background:none;color:var(--muted);cursor:pointer}
  .chip.on{color:var(--ink);background:var(--paper);border-color:var(--paper)}
  .chip.on[data-z="BANQUETES"]{background:var(--banquetes);border-color:var(--banquetes);color:#fff}
  .chip.on[data-z="COCINA HOTEL"]{background:var(--hotel);border-color:var(--hotel);color:#fff}
  .chip.on[data-z="COCINA PALAU"]{background:var(--palau);border-color:var(--palau);color:#fff}
  .chips + .chips{margin-top:6px}
  .name-chip{border-style:dashed;text-transform:none;letter-spacing:.02em;font-size:.9rem}
  .name-chip.on{border-style:solid}

  main{max-width:640px;margin:0 auto;padding:14px 12px 60px}

  .day{margin-bottom:22px;scroll-margin-top:150px}
  .day-head{display:flex;align-items:center;gap:10px;padding:6px 4px;margin-bottom:8px;border-bottom:1px dashed var(--steel)}
  .day-head h2{font-family:'Barlow Condensed';font-weight:600;font-size:1.15rem;letter-spacing:.05em;text-transform:uppercase;color:#cfd6df}
  .tag-hoy{font-family:'Barlow Condensed';font-weight:700;font-size:.75rem;letter-spacing:.1em;background:var(--hoy);color:#fff;border-radius:4px;padding:2px 8px;text-transform:uppercase}
  .day-count{margin-left:auto;font-size:.75rem;color:var(--muted)}

  .ticket{display:grid;grid-template-columns:5px 1fr auto;background:var(--paper);color:var(--ink);border-radius:8px;overflow:hidden;margin-bottom:8px;box-shadow:0 1px 0 rgba(0,0,0,.35)}
  .ticket .stripe{background:var(--muted)}
  .ticket[data-z="BANQUETES"] .stripe{background:var(--banquetes)}
  .ticket[data-z="COCINA HOTEL"] .stripe{background:var(--hotel)}
  .ticket[data-z="COCINA PALAU"] .stripe{background:var(--palau)}
  .t-main{padding:10px 12px;min-width:0}
  .t-name{font-weight:600;font-size:1rem;line-height:1.25}
  .t-zone{font-family:'Barlow Condensed';font-weight:600;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .t-time{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;padding:10px 14px;border-left:1px dashed var(--line)}
  .t-hours{font-family:'Barlow Condensed';font-weight:700;font-size:1.25rem;letter-spacing:.02em;white-space:nowrap;font-variant-numeric:tabular-nums}
  .t-night{font-size:.68rem;color:var(--hoy);font-weight:600;letter-spacing:.05em;text-transform:uppercase}

  .state{text-align:center;color:var(--muted);padding:50px 20px;font-size:.95rem;line-height:1.5}
  .state b{color:var(--paper)}
  .spinner{width:26px;height:26px;border:3px solid var(--steel);border-top-color:var(--banquetes);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation-duration:2s}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Horarios <span>Fregadores</span></h1>
    <div class="updated" id="updated"></div>
  </div>
  <div class="controls">
    <div class="search"><input id="q" type="search" placeholder="Busca tu nombre…" autocomplete="off"></div>
    <button class="btn" id="reload" title="Actualizar" aria-label="Actualizar">⟳</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="chips" id="namechips"></div>
</header>

<main id="app">
  <div class="state"><div class="spinner"></div>Cargando horarios…</div>
</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmMytMNWbZy0Q17VSSFg70LFvkeUmkFu6lKEEYe4Qsxfj7pR8llIUKL1kJ_b5PC47zkH6g4jOCvKRC/pub?gid=678979776&single=true&output=csv";

const MESES = {enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,setiembre:8,octubre:9,noviembre:10,diciembre:11};
const app = document.getElementById('app');
const chipsEl = document.getElementById('chips');
let rows = [], zones = [], names = [], activeZone = null, activeName = null;

function parseCSV(text){
  const out=[]; let row=[], cur='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else inQ=false; }
      else cur+=c;
    }else{
      if(c==='"') inQ=true;
      else if(c===','){row.push(cur);cur='';}
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(cur);out.push(row);row=[];cur=''; }
      else cur+=c;
    }
  }
  if(cur!==''||row.length){row.push(cur);out.push(row);}
  return out;
}

function parseDate(s){
  // "miércoles, 1 de julio" → Date (año actual, ajuste fin de año)
  const m = s.toLowerCase().match(/(\d{1,2})\s+de\s+([a-záéíóúñ]+)(?:\s+de\s+(\d{4}))?/);
  if(!m || !(m[2] in MESES)) return null;
  const now=new Date();
  let y = m[3] ? +m[3] : now.getFullYear();
  let d = new Date(y, MESES[m[2]], +m[1]);
  if(!m[3]){ // sin año: si queda a >6 meses de distancia, ajusta al año más cercano
    const diff = d - now;
    if(diff > 183*864e5) d.setFullYear(y-1);
    if(diff < -183*864e5) d.setFullYear(y+1);
  }
  return d;
}

function isNight(inH,outH){
  const a=parseInt(inH), b=parseInt(outH);
  return !isNaN(a)&&!isNaN(b)&&b<a; // salida "menor" que entrada = pasa de medianoche
}

function load(){
  app.innerHTML = '<div class="state"><div class="spinner"></div>Cargando horarios…</div>';
  fetch(CSV_URL + "&t=" + Date.now())
    .then(r => { if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => {
      const data = parseCSV(text);
      const hi = data.findIndex(r => r.some(c => c.trim().toUpperCase()==='FECHA'));
      if(hi < 0) throw new Error('cabecera');
      rows = data.slice(hi+1)
        .filter(r => r.length>=5 && r[0].trim() && r[1].trim())
        .map(r => ({
          fechaTxt: r[0].trim(),
          fecha: parseDate(r[0]),
          nombre: r[1].trim(),
          zona: r[2].trim().toUpperCase(),
          entrada: r[3].trim(),
          salida: r[4].trim()
        }));
      zones = [...new Set(rows.map(r=>r.zona).filter(Boolean))].sort();
      names = [...new Set(rows.map(r=>r.nombre).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'es'));
      document.getElementById('updated').textContent =
        'Actualizado ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      renderChips();
      renderNameChips();
      render();
    })
    .catch(() => {
      app.innerHTML = '<div class="state"><b>No se han podido cargar los horarios.</b><br>Comprueba la conexión y pulsa ⟳ para reintentar.</div>';
    });
}

function renderChips(){
  chipsEl.innerHTML='';
  const all=document.createElement('button');
  all.className='chip'+(activeZone===null?' on':'');
  all.textContent='Todas';
  all.onclick=()=>{activeZone=null;renderChips();render();};
  chipsEl.appendChild(all);
  zones.forEach(z=>{
    const b=document.createElement('button');
    b.className='chip'+(activeZone===z?' on':'');
    b.dataset.z=z; b.textContent=z.toLowerCase();
    b.onclick=()=>{activeZone=(activeZone===z?null:z);renderChips();render();};
    chipsEl.appendChild(b);
  });
}

function renderNameChips(){
  const el = document.getElementById('namechips');
  el.innerHTML='';
  const all=document.createElement('button');
  all.className='chip name-chip'+(activeName===null?' on':'');
  all.textContent='Todo el equipo';
  all.onclick=()=>{activeName=null;renderNameChips();render();};
  el.appendChild(all);
  names.forEach(n=>{
    const b=document.createElement('button');
    b.className='chip name-chip'+(activeName===n?' on':'');
    b.textContent=shortName(n);
    b.title=n;
    b.onclick=()=>{activeName=(activeName===n?null:n);renderNameChips();render();};
    el.appendChild(b);
  });
}

function shortName(n){
  // "CHAMI, DJAHID" → "Chami" | "BADARA (DIOSSY)" → "Badara" | "EVELIN HERRERA" → "Evelin"
  let s = n.split(/[,(]/)[0].trim().split(/\s+/)[0].toLowerCase();
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function render(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);

  let list = rows.filter(r =>
    (!activeZone || r.zona===activeZone) &&
    (!activeName || r.nombre===activeName) &&
    (!q || r.nombre.toLowerCase().includes(q))
  );

  if(!list.length){
    app.innerHTML='<div class="state">Sin turnos que coincidan.<br>Prueba con otro nombre o quita el filtro de zona.</div>';
    return;
  }

  // agrupar por fecha manteniendo orden del documento
  const groups=[]; const idx={};
  list.forEach(r=>{
    if(!(r.fechaTxt in idx)){ idx[r.fechaTxt]=groups.length; groups.push({txt:r.fechaTxt,date:r.fecha,items:[]}); }
    groups[idx[r.fechaTxt]].items.push(r);
  });

  app.innerHTML='';
  let todayEl=null, nextEl=null;
  groups.forEach(g=>{
    const esHoy = g.date && g.date.getTime()===today.getTime();
    const day=document.createElement('section'); day.className='day';
    day.innerHTML =
      '<div class="day-head"><h2>'+esc(g.txt)+'</h2>'+
      (esHoy?'<span class="tag-hoy">Hoy</span>':'')+
      '<span class="day-count">'+g.items.length+(g.items.length===1?' turno':' turnos')+'</span></div>';
    g.items.forEach(r=>{
      const t=document.createElement('div'); t.className='ticket'; t.dataset.z=r.zona;
      t.innerHTML =
        '<div class="stripe"></div>'+
        '<div class="t-main"><div class="t-name">'+esc(r.nombre)+'</div>'+
        '<div class="t-zone">'+esc(r.zona.toLowerCase())+'</div></div>'+
        '<div class="t-time"><div class="t-hours">'+esc(r.entrada)+' – '+esc(r.salida)+'</div>'+
        (isNight(r.entrada,r.salida)?'<div class="t-night">acaba de madrugada</div>':'')+'</div>';
      day.appendChild(t);
    });
    app.appendChild(day);
    if(esHoy && !todayEl) todayEl=day;
    if(!nextEl && g.date && g.date.getTime()>today.getTime()) nextEl=day;
  });

  const target = todayEl || nextEl;
  if(target) target.scrollIntoView({block:'start'});
}

function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

document.getElementById('q').addEventListener('input', render);
document.getElementById('reload').addEventListener('click', load);
load();
</script>
</body>
</html>
